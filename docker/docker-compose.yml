version: "3.8"
services:
  ghostfwl:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - /mnt/forge-data/datasets:/data:ro
      - /mnt/forge-data/models:/models:ro
    environment:
      - ANIMA_BACKEND=cuda
      - ANIMA_MODULE_NAME=def-ghostfwl
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
