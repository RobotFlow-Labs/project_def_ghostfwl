###########################################################
# training
###########################################################
seed: 42
lr: 0.0001
batch_size: 32 # Reduced batch size for 3D data
epochs: 100
device: cuda:0
pretrained_model_path: ''
freeze_encoder: true

###########################################################
# Output, log
###########################################################
config_name: train
save_model_dir: /path/to/Ghost-FWL/data/save/
save_model_interval: 10
is_train: true
is_log: false  # Set to true to enable wandb logging
log_interval: 100

###########################################################
# dataset, dataloader
###########################################################
num_workers: 8
divide: 1  # Use full dataset

###########################################################
# Model Configuration
###########################################################
model_name: fwl_mae
num_classes: 4
n_channels: 1  # Single channel voxel input
target_size: [128, 128, 256]  # Use original size after downsampling: ~(400, 512, 100)
downsample_z: 256  # Downsample histogram direction to N bins
y_crop_top: 90
y_crop_bottom: 90
z_crop_front: 25


voxel_size: [256, 128, 128]  # (D, H, W) for model - matches target_size after conversion
patch_size: [256, 16, 16]  # (patch_d, patch_h, patch_w)
encoder_embed_dim: 768
encoder_depth: 6
encoder_num_heads: 6
drop_rate: 0.2
attn_drop_rate: 0.2
drop_path_rate: 0.2
###########################################################
# loss, optimizer, scheduler
###########################################################
loss_fn: focal

focal_alpha: [0.0001, 0.05, 0.25, 0.7]
focal_gamma: 2.0

# Optimizer settings
optimizer: adamw    # adamw or adam
scheduler: ''    # Options: step, exponential, cosine, cosine_warm_restarts, or empty string for no scheduler


