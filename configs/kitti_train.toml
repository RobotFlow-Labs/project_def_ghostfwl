[project]
name = "def-ghostfwl"
codename = "DEF-GHOSTFWL"

[training]
batch_size = 4
learning_rate = 0.001
epochs = 50
optimizer = "adamw"
weight_decay = 0.01
scheduler = "cosine"
warmup_steps = 200
precision = "bf16"
gradient_accumulation = 1
max_grad_norm = 1.0
seed = 42

[model]
in_channels = 2
num_classes = 3
base_channels = 32

[data]
cache_dir = "/mnt/forge-data/shared_infra/datasets/kitti_voxel_cache"
velodyne_dir = "/mnt/forge-data/datasets/kitti/training/velodyne"
num_workers = 4
pin_memory = true

[checkpoint]
output_dir = "/mnt/artifacts-datai/checkpoints/project_def_ghostfwl"
save_every_n_steps = 200
keep_top_k = 2
metric = "val_loss"
mode = "min"

[logging]
log_dir = "/mnt/artifacts-datai/logs/project_def_ghostfwl"
tensorboard_dir = "/mnt/artifacts-datai/tensorboard/project_def_ghostfwl"

[early_stopping]
enabled = true
patience = 10
min_delta = 0.0001

[voxel]
x_range = [-51.2, 51.2]
y_range = [-51.2, 51.2]
z_range = [-5.0, 3.0]
voxel_size = [0.4, 0.4, 0.25]
grid_shape = [256, 256, 32]
